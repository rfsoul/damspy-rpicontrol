<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>damspy-rpicontrol - Hendrix TX 008A</title>
<style>
:root{color-scheme:light;font-family:"Segoe UI",sans-serif}
body{margin:0;background:#f2f4f7;color:#111827}
main{max-width:760px;margin:0 auto;padding:2rem 1rem 3rem}
section{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:1rem;margin-bottom:1rem;box-shadow:0 6px 18px rgba(15,23,42,.06)}
.device-nav{font-size:.95rem;margin:.6rem 0 .8rem}
.device-nav a[aria-current="page"]{font-weight:700;text-decoration:underline}
h1,h2{margin-top:0}
form{display:grid;gap:.75rem}
label{display:grid;gap:.35rem;font-weight:600}
select,input,button{font:inherit;padding:.7rem .8rem;border-radius:8px;border:1px solid #cbd5e1}
button{cursor:pointer;background:#0f172a;color:#fff;border:none}
button.secondary{background:#475569}
button.active{background:#b91c1c}
button.active.secondary{background:#15803d}
pre{margin:0;white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:10px;padding:1rem;min-height:6rem}
.health-row{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap}
.health-led{width:14px;height:14px;border-radius:9999px;background:#9ca3af;border:1px solid #6b7280;box-shadow:inset 0 0 4px rgba(0,0,0,.45)}
.health-led.pass{background:#22c55e;border-color:#15803d;box-shadow:0 0 10px rgba(34,197,94,.8)}
.health-led.fail{background:#ef4444;border-color:#b91c1c;box-shadow:0 0 10px rgba(239,68,68,.8)}
</style>
</head>
<body>
<main>
<section>
<h1>damspy-rpicontrol</h1>
<p>Manual LAN control page for: <strong>Hendrix TX 008A</strong> (<code>tx</code>).</p>
<nav class="device-nav">Devices: __DEVICE_NAV__</nav>
<div class="health-row">
<button class="secondary" id="health-check" type="button">Check health</button>
<span id="health-led" class="health-led" aria-label="Health status indicator"></span>
</div>
</section>
<section>
<h2>Set CTX (Turn PA on)</h2>
<div class="health-row">
<button id="ctx-low" type="button">CTX LOW</button>
<button class="secondary" id="ctx-high" type="button">CTX HIGH</button>
</div>
</section>
<section>
<h2>Test TX RGB LED</h2>
<div class="health-row">
<button id="flash-led-red" type="button" aria-pressed="false">Flash LED Red (toggle)</button>
<button class="secondary" id="flash-led-green" type="button" aria-pressed="false">Flash LED Green (toggle)</button>
<button id="led-off-all" type="button">Turn Off All LEDs</button>
</div>
</section>
<section>
<h2>RF Start</h2>
<form data-endpoint="/api/rf/start">
<input name="device" type="hidden" value="tx">
<label>Channel<input name="channel" type="number" min="0" max="80" value="10"></label>
<label>Power<input name="power" type="number" min="0" max="10" value="5"></label>
<button type="submit">Start RF</button>
</form>
</section>
<section>
<h2>Battery</h2>
<form id="battery-form">
<label>Battery Voltage (mV)<input id="battery-mv" name="battery_mv" type="number" inputmode="numeric" readonly placeholder="Not read yet"></label>
<button id="read-battery" type="submit">Read Battery</button>
</form>
</section>
<section>
<h2>RF Stop</h2>
<button id="stop-rf" type="button">Stop RF</button>
</section>
<section>
<h2>Result</h2>
<pre id="output">Ready.</pre>
</section>
</main>
<script>
const currentDevice="tx";
const output=document.getElementById("output");
const healthLed=document.getElementById("health-led");
const batteryMvField=document.getElementById("battery-mv");
const flashButtons={
red:document.getElementById("flash-led-red"),
green:document.getElementById("flash-led-green")
};
const ledLoopState={
activeColor:null,
requestId:0
};
const LED_RETRY_DELAY_MS=500;

function setHealthLed(state){healthLed.classList.remove("pass","fail"),"pass"===state?healthLed.classList.add("pass"):"fail"===state&&healthLed.classList.add("fail")}

function writeResult(title,payload){const lines=[title];payload.detail&&lines.push(`Detail: ${payload.detail}`),Array.isArray(payload.command_sent)&&payload.command_sent.length&&(lines.push("Bytes written:"),lines.push(...payload.command_sent)),Object.prototype.hasOwnProperty.call(payload,"device_response")&&(lines.push("Bytes read:"),lines.push(payload.device_response||(payload.read_attempted?"(no bytes returned)":"(no read attempted)"))),"battery_mv"in payload&&lines.push(`Battery mV: ${payload.battery_mv}`),1===lines.length&&lines.push(JSON.stringify(payload,null,2)),output.textContent=lines.join("\n")}

async function requestJson(endpoint,payload,method="POST"){const response=await fetch(endpoint,{method,headers:payload?{"Content-Type":"application/json"}:{},body:payload?JSON.stringify(payload):void 0});let body;try{body=await response.json()}catch(error){body={detail:"Response was not valid JSON."}}if(!response.ok)throw body;return body}

function bindAction(buttonId,endpoint){document.getElementById(buttonId).addEventListener("click",async()=>{try{writeResult("Success",await requestJson(endpoint))}catch(error){writeResult("Error",error)}})}

function setFlashButtonState(activeColor){Object.entries(flashButtons).forEach(([color,button])=>{const active=color===activeColor;button.classList.toggle("active",active),button.setAttribute("aria-pressed",String(active))})}

function sleep(ms){return new Promise(resolve=>window.setTimeout(resolve,ms))}

async function runFlashLoop(color,requestId){while(ledLoopState.activeColor===color&&ledLoopState.requestId===requestId){try{writeResult("Success",await requestJson(`/api/led/${currentDevice}/flash/${color}`));if(ledLoopState.activeColor!==color||ledLoopState.requestId!==requestId){break}await sleep(50)}catch(error){if(ledLoopState.activeColor!==color||ledLoopState.requestId!==requestId){break}writeResult("Retrying",error);await sleep(LED_RETRY_DELAY_MS)}}}

function startFlashLoop(color){ledLoopState.activeColor=color,ledLoopState.requestId+=1,setFlashButtonState(color),void runFlashLoop(color,ledLoopState.requestId)}

function stopFlashLoop(){ledLoopState.activeColor=null,ledLoopState.requestId+=1,setFlashButtonState(null)}

async function turnOffAllLeds(){stopFlashLoop();try{writeResult("Success",await requestJson(`/api/led/${currentDevice}/off/all`))}catch(error){writeResult("Error",error)}}

document.querySelectorAll("form[data-endpoint]").forEach(form=>{form.addEventListener("submit",async event=>{event.preventDefault();const payload=Object.fromEntries(new FormData(form).entries());"channel"in payload&&(payload.channel=Number(payload.channel)),"power"in payload&&(payload.power=Number(payload.power));try{writeResult("Success",await requestJson(form.dataset.endpoint,payload))}catch(error){writeResult("Error",error)}})});

document.getElementById("battery-form").addEventListener("submit",async event=>{event.preventDefault();try{const payload=await requestJson(`/api/battery/${currentDevice}`);batteryMvField.value=String(payload.battery_mv),writeResult("Success",payload)}catch(error){batteryMvField.value="",writeResult("Error",error)}})

bindAction("ctx-low",`/api/ctx/${currentDevice}/low`);
bindAction("ctx-high",`/api/ctx/${currentDevice}/high`);
bindAction("stop-rf",`/api/rf/stop/${currentDevice}`);
flashButtons.red.addEventListener("click",()=>{ledLoopState.activeColor==="red"?void turnOffAllLeds():startFlashLoop("red")});
flashButtons.green.addEventListener("click",()=>{ledLoopState.activeColor==="green"?void turnOffAllLeds():startFlashLoop("green")});
document.getElementById("led-off-all").addEventListener("click",()=>{void turnOffAllLeds()});

document.getElementById("health-check").addEventListener("click",async()=>{try{const payload=await requestJson("/api/healthcheck",null,"POST");setHealthLed(payload.passed?"pass":"fail"),output.textContent=payload.output||"(no healthcheck output)"}catch(error){setHealthLed("fail"),writeResult("Error",error)}})
</script>
</body>
</html>
