<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>damspy-rpicontrol Â· Test Command</title>
  <style>
    :root { color-scheme: light; font-family: "Segoe UI", sans-serif; }
    body { margin: 0; background: #f2f4f7; color: #111827; }
    main { max-width: 860px; margin: 0 auto; padding: 2rem 1rem 3rem; }
    section { background: #ffffff; border: 1px solid #d0d7de; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06); }
    .device-nav { font-size: 0.95rem; margin: 0.6rem 0 0.8rem; }
    .device-nav a[aria-current="page"] { font-weight: 700; text-decoration: underline; }
    h1, h2 { margin-top: 0; }
    .health-row { display: flex; align-items: center; gap: 0.6rem; }
    .health-led { width: 14px; height: 14px; border-radius: 9999px; background: #9ca3af; border: 1px solid #6b7280; box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.45); }
    .health-led.pass { background: #22c55e; border-color: #15803d; box-shadow: 0 0 10px rgba(34, 197, 94, 0.8); }
    .health-led.fail { background: #ef4444; border-color: #b91c1c; box-shadow: 0 0 10px rgba(239, 68, 68, 0.8); }
    .command-form { display: grid; gap: 0.75rem; }
    .command-row { display: grid; gap: 0.75rem; grid-template-columns: minmax(0, 1fr) auto; align-items: end; }
    label { display: grid; gap: 0.35rem; font-weight: 600; }
    input, button { font: inherit; padding: 0.7rem 0.8rem; border-radius: 8px; border: 1px solid #cbd5e1; }
    button { cursor: pointer; background: #0f172a; color: #ffffff; border: none; }
    button.secondary { background: #475569; }
    pre { margin: 0; white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #e2e8f0; border-radius: 10px; padding: 1rem; min-height: 8rem; }
    .help-text { margin: 0; color: #475569; }
    @media (max-width: 700px) {
      .command-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>damspy-rpicontrol</h1>
      <p>Raw test-command page for the first available supported device: <strong>RODE RXCC 008C / 8091 alias, Hendrix RX 008B, or Hendrix TX 008A</strong>.</p>
      <nav class="device-nav">Devices: __DEVICE_NAV__</nav>
      <div class="health-row">
        <button class="secondary" id="health-check" type="button">Check health</button>
        <span id="health-led" class="health-led" aria-label="Health status indicator"></span>
      </div>
    </section>

    <section>
      <h2>Send Raw Command</h2>
      <form id="test-command-form" class="command-form">
        <div class="command-row">
          <label>Space-separated decimal bytes
            <input id="command-input" name="command" type="text" value="15 13 0" spellcheck="false" autocomplete="off">
          </label>
          <button type="submit">Send</button>
        </div>
        <p class="help-text">Include the report ID in the bytes you enter. Example: <code>15 13 0</code> for RF stop.</p>
      </form>
    </section>

    <section>
      <h2>Response</h2>
      <pre id="output">Ready.</pre>
    </section>
  </main>
  <script>
    const output = document.getElementById("output");
    const healthLed = document.getElementById("health-led");
    function setHealthLed(status) { healthLed.classList.remove("pass", "fail"); if (status === "pass") healthLed.classList.add("pass"); else if (status === "fail") healthLed.classList.add("fail"); }
    function writeResult(title, payload) {
      const lines = [title];
      if (payload.detail) lines.push(`Detail: ${payload.detail}`);
      if ("http_status" in payload) lines.push(`HTTP Status: ${payload.http_status}`);
      if (Array.isArray(payload.command_sent) && payload.command_sent.length) {
        lines.push("Bytes written:");
        lines.push(...payload.command_sent);
      }
      if (Object.prototype.hasOwnProperty.call(payload, "device_response")) {
        lines.push("Bytes read:");
        lines.push(payload.device_response || (payload.read_attempted ? "(no bytes returned)" : "(no read attempted)"));
      }
      if ("raw_response" in payload) lines.push(`Raw response: ${payload.raw_response}`);
      if (lines.length === 1) lines.push(JSON.stringify(payload, null, 2));
      output.textContent = lines.join("\n");
    }
    async function requestJson(endpoint, payload, method = "POST") {
      const response = await fetch(endpoint, { method, headers: payload ? { "Content-Type": "application/json" } : {}, body: payload ? JSON.stringify(payload) : undefined });
      const text = await response.text();
      let body;
      try {
        body = text ? JSON.parse(text) : {};
      } catch (error) {
        throw {
          detail: "Response was not valid JSON.",
          http_status: response.status,
          raw_response: text || "(empty response)",
        };
      }
      if (!response.ok && !Object.prototype.hasOwnProperty.call(body, "http_status")) body.http_status = response.status;
      if (!response.ok) throw body; return body;
    }
    document.getElementById("test-command-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(event.currentTarget).entries());
      try { writeResult("Success", await requestJson("/api/test-command", data)); } catch (error) { writeResult("Error", error); }
    });
    document.getElementById("health-check").addEventListener("click", async () => {
      try { const result = await requestJson("/api/healthcheck", null, "POST"); setHealthLed(result.passed ? "pass" : "fail"); output.textContent = result.output || "(no healthcheck output)"; }
      catch (error) { setHealthLed("fail"); writeResult("Error", error); }
    });
  </script>
</body>
</html>
