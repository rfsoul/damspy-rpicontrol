<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>damspy-rpicontrol · Hendrix RX 008B</title>
<style>:root{color-scheme:light;font-family:"Segoe UI",sans-serif}body{margin:0;background:#f2f4f7;color:#111827}main{max-width:760px;margin:0 auto;padding:2rem 1rem 3rem}section{background:#fff;border:1px solid #d0d7de;border-radius:12px;padding:1rem;margin-bottom:1rem;box-shadow:0 6px 18px rgba(15,23,42,.06)}.device-nav{font-size:.95rem;margin:.6rem 0 .8rem}.device-nav a[aria-current="page"]{font-weight:700;text-decoration:underline}h1,h2{margin-top:0}form{display:grid;gap:.75rem}label{display:grid;gap:.35rem;font-weight:600}select,input,button{font:inherit;padding:.7rem .8rem;border-radius:8px;border:1px solid #cbd5e1}button{cursor:pointer;background:#0f172a;color:#fff;border:none}button.secondary{background:#475569}pre{margin:0;white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e2e8f0;border-radius:10px;padding:1rem;min-height:6rem}.health-row{display:flex;align-items:center;gap:.6rem}.health-led{width:14px;height:14px;border-radius:9999px;background:#9ca3af;border:1px solid #6b7280;box-shadow:inset 0 0 4px rgba(0,0,0,.45)}.health-led.pass{background:#22c55e;border-color:#15803d;box-shadow:0 0 10px rgba(34,197,94,.8)}.health-led.fail{background:#ef4444;border-color:#b91c1c;box-shadow:0 0 10px rgba(239,68,68,.8)}</style></head>
<body><main><section><h1>damspy-rpicontrol</h1><p>Manual LAN control page for: <strong>Hendrix RX 008B</strong> (<code>rx</code>).</p><nav class="device-nav">Devices: __DEVICE_NAV__</nav><div class="health-row"><button class="secondary" id="health-check" type="button">Check health</button><span id="health-led" class="health-led" aria-label="Health status indicator"></span></div></section>
<section><h2>Set CTX (Turn PA on)</h2><div class="health-row"><button id="ctx-low" type="button">CTX LOW</button><button class="secondary" id="ctx-high" type="button">CTX HIGH</button></div></section>
<section><h2>RF Start</h2><form data-endpoint="/api/rf/start"><input name="device" type="hidden" value="rx"><label>Channel<input name="channel" type="number" min="0" max="80" value="10"></label><label>Power<input name="power" type="number" min="0" max="10" value="5"></label><button type="submit">Start RF</button></form></section>
<section><h2>RF Stop</h2><button id="stop-rf" type="button">Stop RF</button></section><section><h2>Result</h2><pre id="output">Ready.</pre></section></main>
<script>const currentDevice="rx",output=document.getElementById("output"),healthLed=document.getElementById("health-led");function setHealthLed(t){healthLed.classList.remove("pass","fail"),"pass"===t?healthLed.classList.add("pass"):"fail"===t&&healthLed.classList.add("fail")}function writeResult(t,e){const i=[t];e.detail&&i.push(`Detail: ${e.detail}`),Array.isArray(e.command_sent)&&e.command_sent.length&&(i.push("Bytes written:"),i.push(...e.command_sent)),Object.prototype.hasOwnProperty.call(e,"device_response")&&(i.push("Bytes read:"),i.push(e.device_response||(e.read_attempted?"(no bytes returned)":"(no read attempted)"))),"battery_mv"in e&&i.push(`Battery mV: ${e.battery_mv}`),1===i.length&&i.push(JSON.stringify(e,null,2)),output.textContent=i.join("\n")}async function requestJson(t,e,i="POST"){const o=await fetch(t,{method:i,headers:e?{"Content-Type":"application/json"}:{},body:e?JSON.stringify(e):void 0});let n;try{n=await o.json()}catch(t){n={detail:"Response was not valid JSON."}}if(!o.ok)throw n;return n}document.querySelectorAll("form[data-endpoint]").forEach(t=>{t.addEventListener("submit",async e=>{e.preventDefault();const i=Object.fromEntries(new FormData(t).entries());"channel"in i&&(i.channel=Number(i.channel)),"power"in i&&(i.power=Number(i.power));try{writeResult("Success",await requestJson(t.dataset.endpoint,i))}catch(t){writeResult("Error",t)}})}),document.getElementById("ctx-low").addEventListener("click",async()=>{try{writeResult("Success",await requestJson(`/api/ctx/${currentDevice}/low`))}catch(t){writeResult("Error",t)}}),document.getElementById("ctx-high").addEventListener("click",async()=>{try{writeResult("Success",await requestJson(`/api/ctx/${currentDevice}/high`))}catch(t){writeResult("Error",t)}}),document.getElementById("stop-rf").addEventListener("click",async()=>{try{writeResult("Success",await requestJson(`/api/rf/stop/${currentDevice}`))}catch(t){writeResult("Error",t)}}),document.getElementById("health-check").addEventListener("click",async()=>{try{const t=await requestJson("/api/healthcheck",null,"POST");setHealthLed(t.passed?"pass":"fail"),output.textContent=t.output||"(no healthcheck output)"}catch(t){setHealthLed("fail"),writeResult("Error",t)}});</script>
</body></html>
