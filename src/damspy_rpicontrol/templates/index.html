<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>damspy-rpicontrol · __DEVICE_NAME__</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      background: #f2f4f7;
      color: #111827;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }

    section {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
    }

    .device-nav {
      font-size: 0.95rem;
      margin: 0.6rem 0 0.8rem;
    }

    .device-nav a[aria-current="page"] {
      font-weight: 700;
      text-decoration: underline;
    }

    h1, h2 {
      margin-top: 0;
    }

    form {
      display: grid;
      gap: 0.75rem;
    }

    label {
      display: grid;
      gap: 0.35rem;
      font-weight: 600;
    }

    select, input, button {
      font: inherit;
      padding: 0.7rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
    }

    button {
      cursor: pointer;
      background: #0f172a;
      color: #ffffff;
      border: none;
    }

    button.secondary {
      background: #475569;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 10px;
      padding: 1rem;
      min-height: 6rem;
    }

    .health-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .health-led {
      width: 14px;
      height: 14px;
      border-radius: 9999px;
      background: #9ca3af;
      border: 1px solid #6b7280;
      box-shadow: inset 0 0 4px rgba(0, 0, 0, 0.45);
    }

    .health-led.pass {
      background: #22c55e;
      border-color: #15803d;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.8);
    }

    .health-led.fail {
      background: #ef4444;
      border-color: #b91c1c;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>damspy-rpicontrol</h1>
      <p>Manual LAN control page for: <strong>__DEVICE_NAME__</strong> (<code>__DEVICE_KEY__</code>).</p>
      <nav class="device-nav">Devices: __DEVICE_NAV__</nav>
      <div class="health-row">
        <button class="secondary" id="health-check" type="button">Check health</button>
        <span id="health-led" class="health-led" aria-label="Health status indicator"></span>
      </div>
    </section>

    <section>
      <h2>Front-end Mode</h2>
      <form data-endpoint="/api/frontend/mode" data-devices="rxcc">
        <label>
          Mode
          <select name="mode">
            <option value="transmitting-pa">transmitting-pa</option>
            <option value="bypass">bypass</option>
            <option value="receiving">receiving</option>
          </select>
        </label>
        <button type="submit">Apply mode</button>
      </form>
    </section>

    <section>
      <h2>Antenna Path</h2>
      <form data-endpoint="/api/antenna" data-devices="rxcc">
        <label>
          Antenna
          <select name="path">
            <option value="main">main</option>
            <option value="secondary">secondary</option>
          </select>
        </label>
        <button type="submit">Set antenna</button>
      </form>
    </section>

    <section>
      <h2>RF Start</h2>
      <form data-endpoint="/api/rf/start">
        <input name="device" type="hidden" value="__DEVICE_KEY__">
        <label data-devices="rxcc">
          Antenna
          <select name="antenna">
            <option value="main">main</option>
            <option value="secondary">secondary</option>
          </select>
        </label>
        <label>
          Channel
          <input name="channel" type="number" min="0" max="79" value="10">
        </label>
        <label>
          Power
          <input name="power" type="number" min="0" max="10" value="5">
        </label>
        <button type="submit">Start RF</button>
      </form>
    </section>


    <section>
      <h2>RF Stop</h2>
      <button id="stop-rf" type="button">Stop RF</button>
    </section>

    <section>
      <h2>Result</h2>
      <pre id="output">Ready.</pre>
    </section>
  </main>

  <script>
    const currentDevice = "__DEVICE_KEY__";
    const output = document.getElementById("output");
    const healthLed = document.getElementById("health-led");

    function setHealthLed(status) {
      healthLed.classList.remove("pass", "fail");
      if (status === "pass") {
        healthLed.classList.add("pass");
      } else if (status === "fail") {
        healthLed.classList.add("fail");
      }
    }

    function writeResult(title, payload) {
      output.textContent = `${title}\n${JSON.stringify(payload, null, 2)}`;
    }

    async function requestJson(endpoint, payload, method = "POST") {
      const response = await fetch(endpoint, {
        method,
        headers: payload ? { "Content-Type": "application/json" } : {},
        body: payload ? JSON.stringify(payload) : undefined
      });

      let body;
      try {
        body = await response.json();
      } catch (error) {
        body = { detail: "Response was not valid JSON." };
      }

      if (!response.ok) {
        throw body;
      }

      return body;
    }

    document.querySelectorAll("[data-devices]").forEach((element) => {
      const allowed = element.dataset.devices.split(",").map((part) => part.trim());
      if (!allowed.includes(currentDevice)) {
        const section = element.closest("section");
        if (section) {
          section.style.display = "none";
        } else {
          element.style.display = "none";
        }
      }
    });

    document.querySelectorAll("form[data-endpoint]").forEach((form) => {
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = Object.fromEntries(new FormData(form).entries());

        if ("channel" in data) {
          data.channel = Number(data.channel);
        }
        if ("power" in data) {
          data.power = Number(data.power);
        }
        if (!("device" in data)) {
          data.device = currentDevice;
        }

        try {
          const result = await requestJson(form.dataset.endpoint, data);
          writeResult("Success", result);
        } catch (error) {
          writeResult("Error", error);
        }
      });
    });


    document.getElementById("stop-rf").addEventListener("click", async () => {
      try {
        const endpoint = currentDevice === "rxcc"
          ? "/api/rf/stop"
          : `/api/rf/stop/${currentDevice}`;
        const result = await requestJson(endpoint);
        writeResult("Success", result);
      } catch (error) {
        writeResult("Error", error);
      }
    });

    document.getElementById("health-check").addEventListener("click", async () => {
      try {
        const result = await requestJson("/api/healthcheck", null, "POST");
        setHealthLed(result.passed ? "pass" : "fail");
        output.textContent = result.output || "(no healthcheck output)";
      } catch (error) {
        setHealthLed("fail");
        writeResult("Error", error);
      }
    });
  </script>
</body>
</html>
